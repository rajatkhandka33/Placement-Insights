<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Placement and Insights</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: rgba(255, 255, 255, 0.78);
        --text: #1f2328;
        --muted: #667085;
        --accent: #0f766e;
        --accent-soft: rgba(15, 118, 110, 0.12);
        --accent-2: #ca8a04;
        --border: rgba(31, 35, 40, 0.1);
        --shadow: 0 22px 60px rgba(21, 29, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Grande", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(15, 118, 110, 0.15),
            transparent 30%
          ),
          radial-gradient(
            circle at top right,
            rgba(202, 138, 4, 0.18),
            transparent 28%
          ),
          linear-gradient(135deg, #f7f2e8 0%, #f0e7d7 55%, #f7f4ef 100%);
        min-height: 100vh;
      }

      a {
        color: inherit;
      }

      .wrap {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        border-radius: 24px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.35fr 0.95fr;
        gap: 18px;
        align-items: stretch;
        margin-bottom: 18px;
      }

      .hero-main {
        padding: 30px;
        position: relative;
        overflow: hidden;
      }

      .hero-main::after {
        content: "";
        position: absolute;
        inset: auto -60px -60px auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(15, 118, 110, 0.24),
          transparent 68%
        );
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.3rem, 4vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero-copy {
        max-width: 68ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .hero-actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .hero-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border-radius: 14px;
        padding: 13px 18px;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .hero-link:hover {
        transform: translateY(-1px);
      }

      .primary-link {
        background: linear-gradient(135deg, var(--accent), #115e59);
        color: white;
        box-shadow: 0 16px 32px rgba(15, 118, 110, 0.22);
      }

      .ghost-link {
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .hero-side {
        padding: 24px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .side-note {
        color: var(--muted);
        line-height: 1.6;
      }

      .workflow {
        display: grid;
        gap: 12px;
      }

      .workflow-step {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
      }

      .workflow-step strong {
        display: block;
        margin-bottom: 5px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .stat {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        min-height: 100px;
      }

      .stat .label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .stat .value {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .section {
        padding: 24px;
        margin-top: 18px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.03em;
      }

      .section-title span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .cards-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .info-card {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid var(--border);
      }

      .info-card h3 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .info-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: #125e5b;
        border: 1px solid rgba(15, 118, 110, 0.12);
        font-size: 13px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.02fr 0.98fr;
        gap: 18px;
        align-items: start;
        margin-top: 18px;
      }

      .card {
        padding: 24px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 0.95rem;
        color: #2f3640;
      }

      input {
        width: 100%;
        border: 1px solid rgba(31, 35, 40, 0.12);
        background: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        outline: none;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        transform: translateY(-1px);
      }

      .actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #115e59);
        color: white;
        box-shadow: 0 16px 32px rgba(15, 118, 110, 0.22);
      }

      .secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .result-box {
        margin-top: 18px;
        border-radius: 20px;
        padding: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
      }

      .result-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .placed {
        background: rgba(15, 118, 110, 0.12);
        color: var(--accent);
      }

      .not-placed {
        background: rgba(202, 138, 4, 0.14);
        color: #92400e;
      }

      .mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .mini {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border);
      }

      .mini .mini-label {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .mini .mini-value {
        font-size: 1.25rem;
        font-weight: 800;
      }

      .bars {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .bar-row {
        display: grid;
        gap: 6px;
      }

      .bar-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.92rem;
        color: #374151;
      }

      .bar-track {
        height: 12px;
        border-radius: 999px;
        background: rgba(31, 35, 40, 0.08);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #36b6a8);
      }

      .muted {
        color: var(--muted);
      }

      .list-block {
        margin: 12px 0 0;
        padding-left: 18px;
        color: #374151;
        line-height: 1.6;
      }

      .footer {
        margin-top: 18px;
        padding: 22px 24px;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        flex-wrap: wrap;
        align-items: center;
      }

      .footer small {
        color: var(--muted);
      }

      .auth-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .auth-card {
        width: min(1100px, 100%);
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        overflow: hidden;
      }

      .auth-hero {
        padding: 34px;
        color: white;
        background: linear-gradient(
          145deg,
          #0f172a 0%,
          #0f766e 55%,
          #111827 100%
        );
      }

      .auth-hero h1,
      .auth-hero p {
        color: white;
      }

      .auth-form-panel {
        padding: 34px;
        background: rgba(255, 255, 255, 0.92);
      }

      .auth-form {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .auth-field {
        display: grid;
        gap: 8px;
      }

      .auth-field small {
        color: var(--muted);
      }

      .auth-tips {
        margin-top: 18px;
        padding-left: 18px;
        line-height: 1.7;
        color: #374151;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 290px minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        align-self: start;
        min-height: 100vh;
        padding: 24px;
        background: rgba(15, 23, 42, 0.96);
        color: white;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      .brand-block {
        padding-bottom: 18px;
        margin-bottom: 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .brand-title {
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .brand-subtitle {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }

      .role-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
      }

      .role-admin {
        background: rgba(15, 118, 110, 0.2);
        color: #a7f3d0;
      }

      .role-student {
        background: rgba(202, 138, 4, 0.2);
        color: #fde68a;
      }

      .sidebar-nav {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .sidebar-link,
      .sidebar-button {
        width: 100%;
        border: 0;
        text-align: left;
        border-radius: 16px;
        padding: 13px 15px;
        background: transparent;
        color: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        font: inherit;
      }

      .sidebar-link.active,
      .sidebar-button.active {
        background: rgba(255, 255, 255, 0.1);
      }

      .sidebar-link:hover,
      .sidebar-button:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .sidebar-meta {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        gap: 10px;
      }

      .sidebar-meta small {
        color: rgba(255, 255, 255, 0.7);
      }

      .main-panel {
        padding: 24px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .topbar h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw, 2.3rem);
      }

      .topbar-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .overview-card,
      .download-card,
      .student-card,
      .profile-card {
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--border);
      }

      .overview-label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .overview-value {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .section-stack {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }

      .dashboard-grid,
      .analytics-grid,
      .students-grid,
      .downloads-grid {
        display: grid;
        gap: 18px;
      }

      .dashboard-grid {
        grid-template-columns: 1.2fr 0.8fr;
      }

      .analytics-grid,
      .students-grid,
      .downloads-grid {
        grid-template-columns: 1fr 1fr;
      }

      .section-card {
        padding: 22px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border);
      }

      .section-card h2 {
        margin: 0 0 10px;
      }

      .section-card p {
        color: var(--muted);
        line-height: 1.65;
      }

      .download-actions,
      .student-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .flat-button {
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
      }

      .danger-button {
        background: rgba(202, 138, 4, 0.12);
        color: #92400e;
      }

      .table-wrap {
        overflow: auto;
        border-radius: 18px;
        border: 1px solid var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.85);
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(31, 35, 40, 0.08);
        text-align: left;
      }

      th {
        background: rgba(15, 118, 110, 0.05);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .student-list {
        display: grid;
        gap: 12px;
      }

      .student-card {
        display: grid;
        gap: 10px;
      }

      .student-card strong {
        font-size: 1rem;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .section-empty {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px dashed var(--border);
        color: var(--muted);
      }

      .download-selector {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .status-line {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 118, 110, 0.08);
        color: #115e59;
      }

      @media (max-width: 1080px) {
        .auth-card,
        .app-shell,
        .dashboard-grid,
        .analytics-grid,
        .students-grid,
        .downloads-grid,
        .overview-grid,
        .cards-3 {
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: auto;
          position: relative;
        }
      }

      @media (max-width: 640px) {
        .wrap {
          width: min(100% - 20px, 1240px);
        }

        .hero-main,
        .hero-side,
        .card,
        .section,
        .footer,
        .main-panel,
        .sidebar,
        .auth-form-panel,
        .auth-hero {
          padding: 18px;
        }

        .stat-grid,
        .form-grid,
        .mini-grid,
        .overview-grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const STORAGE_KEY = "placement-insights-session";

      function parseRoute() {
        const raw = window.location.hash.replace(/^#/, "") || "login";
        const [page, param] = raw.split("/");
        return { page: page || "login", param: param || "" };
      }

      async function requestJSON(url, token, options = {}) {
        const headers = new Headers(options.headers || {});
        if (token) {
          headers.set("Authorization", `Bearer ${token}`);
        }
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(
            payload.detail || `Request failed with ${response.status}`,
          );
        }
        return response.json();
      }

      async function requestBlob(url, token) {
        const headers = new Headers();
        if (token) {
          headers.set("Authorization", `Bearer ${token}`);
        }
        const response = await fetch(url, { headers });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(
            payload.detail || `Download failed with ${response.status}`,
          );
        }
        return response.blob();
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function formatValue(value, fallback = "-") {
        if (value === null || value === undefined || value === "") {
          return fallback;
        }
        if (typeof value === "number") {
          return Number.isInteger(value) ? value.toString() : value.toFixed(2);
        }
        return value;
      }

      function App() {
        const [route, setRoute] = useState(parseRoute());
        const [token, setToken] = useState(
          () => localStorage.getItem(STORAGE_KEY) || "",
        );
        const [user, setUser] = useState(null);
        const [bootstrap, setBootstrap] = useState(null);
        const [publicData, setPublicData] = useState(null);
        const [students, setStudents] = useState([]);
        const [selectedStudentId, setSelectedStudentId] = useState(null);
        const [loginForm, setLoginForm] = useState({
          username: "admin",
          password: "admin123",
        });
        const [loadingSession, setLoadingSession] = useState(Boolean(token));
        const [loginError, setLoginError] = useState("");
        const [pageError, setPageError] = useState("");
        const [pageNotice, setPageNotice] = useState("");
        const [busyDownload, setBusyDownload] = useState("");
        const [studentQueryId, setStudentQueryId] = useState("");

        const go = (value) => {
          window.location.hash = `#${value}`;
        };

        const refreshPublic = async () => {
          try {
            const data = await requestJSON("/api/site-data");
            setPublicData(data);
          } catch (error) {
            setPageError(error.message);
          }
        };

        const refreshSession = async (sessionToken) => {
          setLoadingSession(true);
          try {
            const data = await requestJSON("/api/bootstrap", sessionToken);
            setBootstrap(data);
            setUser(data.user);
            setStudents(data.students || []);
            const nextStudentId =
              data.user?.role === "student"
                ? data.user.student_id
                : (data.students?.[0]?.student_id ?? null);
            setSelectedStudentId(nextStudentId);
            setStudentQueryId(nextStudentId ? String(nextStudentId) : "");
            setPageError("");
            setLoginError("");
          } catch (error) {
            localStorage.removeItem(STORAGE_KEY);
            setToken("");
            setUser(null);
            setBootstrap(null);
            setStudents([]);
            setSelectedStudentId(null);
            setStudentQueryId("");
            setPageError(error.message);
            go("login");
          } finally {
            setLoadingSession(false);
          }
        };

        useEffect(() => {
          refreshPublic();
          const syncRoute = () => setRoute(parseRoute());
          window.addEventListener("hashchange", syncRoute);
          syncRoute();
          return () => window.removeEventListener("hashchange", syncRoute);
        }, []);

        useEffect(() => {
          if (token) {
            refreshSession(token);
          }
        }, [token]);

        useEffect(() => {
          if (!user) {
            if (route.page !== "login") {
              go("login");
            }
            return;
          }

          if (route.page === "login") {
            go("dashboard");
          }

          if (
            user.role === "student" &&
            ["analytics", "students"].includes(route.page)
          ) {
            go("dashboard");
          }
        }, [route.page, user]);

        useEffect(() => {
          if (route.page === "profile" && route.param) {
            setSelectedStudentId(Number(route.param));
          }
        }, [route.page, route.param]);

        const project = bootstrap?.project || publicData?.project || {};
        const model = bootstrap?.model || publicData?.model || {};
        const insights = bootstrap?.insights || publicData?.insights || {};
        const summary = insights.summary || {};
        const isAdmin = user?.role === "admin";
        const isStudent = user?.role === "student";

        const navItems = useMemo(() => {
          if (isAdmin) {
            return [
              { page: "dashboard", label: "Dashboard" },
              { page: "analytics", label: "Analytics" },
              { page: "students", label: "Students" },
              { page: "downloads", label: "Downloads" },
            ];
          }
          return [
            { page: "dashboard", label: "Dashboard" },
            { page: "profile", label: "My Profile" },
            { page: "downloads", label: "Downloads" },
          ];
        }, [isAdmin]);

        const heroMetrics = useMemo(
          () => [
            { label: "Total students", value: summary.total_students },
            {
              label: "Placement rate",
              value: summary.placement_rate,
              suffix: "%",
            },
            { label: "Average CGPA", value: summary.avg_cgpa },
            { label: "Average aptitude", value: summary.avg_aptitude },
          ],
          [summary],
        );

        const selectedStudent = useMemo(() => {
          if (!students.length) {
            return null;
          }
          const id = Number(
            selectedStudentId ||
              route.param ||
              user?.student_id ||
              students[0]?.student_id,
          );
          return (
            students.find((item) => Number(item.student_id) === id) ||
            students[0] ||
            null
          );
        }, [selectedStudentId, route.param, students, user]);

        const renderBars = (
          items,
          valueKey = "placement_rate",
          suffix = "%",
        ) => {
          if (!items?.length) {
            return (
              <div className="section-empty">
                Not enough grouped data for this chart.
              </div>
            );
          }

          const max = Math.max(
            ...items.map((item) => Math.abs(item[valueKey] ?? item.delta ?? 0)),
            1,
          );

          return (
            <div className="bars">
              {items.map((item) => {
                const rawValue = item[valueKey] ?? item.delta ?? 0;
                const width = Math.max(8, (Math.abs(rawValue) / max) * 100);
                const labelValue =
                  item.placement_rate !== undefined
                    ? `${item.placement_rate}%`
                    : `${item.delta >= 0 ? "+" : ""}${item.delta}`;

                return (
                  <div className="bar-row" key={item.label}>
                    <div className="bar-head">
                      <strong>{item.label}</strong>
                      <span>
                        {labelValue} {suffix}
                      </span>
                    </div>
                    <div className="bar-track">
                      <div
                        className="bar-fill"
                        style={{ width: `${width}%` }}
                      ></div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        };

        const logout = async () => {
          try {
            if (token) {
              await requestJSON("/api/auth/logout", token, { method: "POST" });
            }
          } catch (error) {
            setPageNotice(error.message);
          } finally {
            localStorage.removeItem(STORAGE_KEY);
            setToken("");
            setUser(null);
            setBootstrap(null);
            setStudents([]);
            setSelectedStudentId(null);
            setStudentQueryId("");
            go("login");
          }
        };

        const login = async (event) => {
          event.preventDefault();
          setLoginError("");
          setPageError("");
          try {
            const payload = await requestJSON("/api/auth/login", null, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(loginForm),
            });
            localStorage.setItem(STORAGE_KEY, payload.token);
            setToken(payload.token);
            await refreshSession(payload.token);
            go("dashboard");
          } catch (error) {
            setLoginError(error.message);
          }
        };

        const downloadCsv = async (endpoint, filename) => {
          setBusyDownload(filename);
          try {
            const blob = await requestBlob(endpoint, token);
            downloadBlob(blob, filename);
            setPageNotice(`Downloaded ${filename}`);
          } catch (error) {
            setPageError(error.message);
          } finally {
            setBusyDownload("");
          }
        };

        const roleLabel = isAdmin
          ? "Administrator"
          : isStudent
            ? "Student"
            : "Visitor";
        const accessLabel = isAdmin
          ? "Full access"
          : isStudent
            ? "Personal profile access"
            : "Limited access";

        if (!user) {
          const demoCards = [
            {
              label: "Total students",
              value: summary.total_students?.toLocaleString?.() ?? "...",
            },
            {
              label: "Placement rate",
              value:
                summary.placement_rate != null
                  ? `${summary.placement_rate}%`
                  : "...",
            },
            { label: "Model", value: model.algorithm || "Loading..." },
            { label: "Role access", value: "Student / Admin" },
          ];

          return (
            <div className="auth-screen">
              <div className="panel auth-card">
                <div className="auth-hero">
                  <div className="eyebrow">Smart Placement and Insights</div>

                  <p className="hero-copy">
                    Students can see their own profile, placement readiness, and
                    downloads. Admins can view the full dashboard, analytics,
                    student list, and CSV exports.
                  </p>
                  <div className="overview-grid" style={{ marginTop: 18 }}>
                    {demoCards.map((item) => (
                      <div className="overview-card" key={item.label}>
                        <div className="overview-label">{item.label}</div>
                        <div
                          className="overview-value"
                          style={{ color: "white" }}
                        >
                          {item.value}
                        </div>
                      </div>
                    ))}
                  </div>
                  <ul className="auth-tips">
                    <li>Use the seeded demo accounts to start quickly.</li>
                    <li>The app stays fully local after cloning the repo.</li>
                    <li>
                      Admins get access to analytics and dataset downloads.
                    </li>
                  </ul>
                </div>

                <div className="auth-form-panel">
                  <div className="section-title">
                    <h2>Sign in</h2>
                    <span>Local role-based access</span>
                  </div>
                  <form className="auth-form" onSubmit={login}>

                        type="text"
                        value={loginForm.username}
                        onChange={(event) =>
                          setLoginForm((current) => ({
                            ...current,
                            username: event.target.value,
                          }))
                        }
                        placeholder="admin or student1"
                      />
                    </label>
                    <label className="auth-field">
                      Password
                      <input
                        type="password"
                        value={loginForm.password}
                        onChange={(event) =>
                          setLoginForm((current) => ({
                            ...current,
                            password: event.target.value,
                          }))
                        }
                        placeholder="admin123 or student123"
                      />
                    </label>
                    <button className="primary" type="submit">
                      {loadingSession ? "Checking session..." : "Login"}

                    {loginError ? (
                      <div className="status-line">{loginError}</div>

                  </form>

                  <div className="section-title" style={{ marginTop: 20 }}>
                    <h2>Demo accounts</h2>
                  </div>
                  <div className="section-empty">
                    <strong>Admin</strong>: `admin / admin123`
                    <br />
                    <strong>Student</strong>: `student1 / student123`
                    <br />
                    <strong>Student</strong>: `student2 / student123`
                    <br />
                    <strong>Student</strong>: `student3 / student123`
                  </div>
                  {pageError ? (
                    <div className="status-line" style={{ marginTop: 14 }}>
                      {pageError}
                    </div>
                  ) : null}
                </div>
              </div>
            </div>

                </div>
                <p>

                </p>
                <div className="pill-row">
                  <span className="pill">{accessLabel}</span>
                  <span className="pill">
                    {model.algorithm || "Saved model"}
                  </span>
                  <span className="pill">{model.target || "Placement"}</span>
                </div>
                <div className="download-actions">
                  <button
                    className="flat-button"
                    type="button"

                      type="button"

            </div>

              <div style={{ height: 18 }}></div>
              <div className="section-title">
                <h2>Model importance</h2>
                <span>{model.algorithm || "Model"}</span>
              </div>
              {renderBars(
                (model.top_importances || []).map((item) => ({
                  label: item.label,
                  delta: item.score,
                })),
                "delta",
                "importance",
              )}
            </section>
          </div>
        );

        const Students = () => (
          <div className="students-grid">
            <section className="section-card">
              <div className="section-title">
                <h2>Student section</h2>
                <span>Seeded local profiles</span>
              </div>
              <div className="student-list">
                {students.length ? (
                  students.map((student) => (
                    <div className="student-card" key={student.student_id}>
                      <strong>
                        {student.display_name || student.username}
                      </strong>
                      <div className="pill-row">
                        <span className="pill">ID {student.student_id}</span>
                        <span className="pill">
                          {student.branch || "Unknown branch"}
                        </span>
                        <span className="pill">{student.placement}</span>
                      </div>
                      <div className="student-actions">
                        <button
                          className="flat-button"
                          type="button"
                          onClick={() => go(`profile/${student.student_id}`)}
                        >
                          Open profile
                        </button>
                        <button
                          className="flat-button"
                          type="button"
                          onClick={() =>
                            downloadCsv(
                              `/api/download/student.csv?student_id=${student.student_id}`,
                              `student_${student.student_id}.csv`,
                            )
                          }
                        >
                          Download CSV
                        </button>
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="section-empty">
                    No student profiles loaded yet.
                  </div>
                )}
              </div>
            </section>

            <section className="section-card">
              <div className="section-title">
                <h2>Profile viewer</h2>
                <span>Admin can inspect an individual student</span>
              </div>
              {isAdmin ? (
                <div className="download-selector">
                  <label className="auth-field">
                    Choose student
                    <select
                      value={selectedStudentId || ""}
                      onChange={(event) => {
                        const value = event.target.value;
                        setSelectedStudentId(value ? Number(value) : null);
                        if (value) {
                          go(`profile/${value}`);
                        }
                      }}
                    >
                      <option value="">Select a profile</option>
                      {students.map((student) => (
                        <option
                          key={student.student_id}
                          value={student.student_id}
                        >
                          {student.display_name || student.username} (ID{" "}
                          {student.student_id})
                        </option>
                      ))}
                    </select>
                  </label>
                  {resolvedProfile ? (
                    <div className="profile-card">
                      <div className="section-title">
                        <h2>
                          {resolvedProfile.display_name ||
                            resolvedProfile.username ||
                            `Student ${resolvedProfile.student_id}`}
                        </h2>
                        <span>Student ID {resolvedProfile.student_id}</span>
                      </div>
                      <div className="mini-grid">
                        <div className="mini">
                          <div className="mini-label">CGPA</div>
                          <div className="mini-value">
                            {formatValue(resolvedProfile.profile?.CGPA)}
                          </div>
                        </div>
                        <div className="mini">
                          <div className="mini-label">Internships</div>
                          <div className="mini-value">
                            {formatValue(resolvedProfile.profile?.Internships)}
                          </div>
                        </div>
                        <div className="mini">
                          <div className="mini-label">Projects</div>
                          <div className="mini-value">
                            {formatValue(resolvedProfile.profile?.Projects)}
                          </div>
                        </div>
                        <div className="mini">
                          <div className="mini-label">Backlogs</div>
                          <div className="mini-value">
                            {formatValue(resolvedProfile.profile?.Backlogs)}
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="section-empty">
                      Select a student to inspect the profile.
                    </div>
                  )}
                </div>
              ) : (
                <div className="section-empty">
                  Students can only see their own profile here.
                </div>
              )}
            </section>
          </div>
        );

        const Profile = () => {
          const profile = isStudent ? students[0] : resolvedProfile;
          if (!profile) {
            return <div className="section-empty">No profile selected.</div>;
          }

          return (
            <div className="section-card">
              <div className="section-title">
                <h2>
                  {profile.display_name ||
                    profile.username ||
                    `Student ${profile.student_id}`}
                </h2>
                <span>{profile.branch || "Profile"}</span>
              </div>
              <div className="overview-grid">
                <div className="overview-card">
                  <div className="overview-label">Placement</div>
                  <div className="overview-value">{profile.placement}</div>
                </div>
                <div className="overview-card">
                  <div className="overview-label">Probability</div>
                  <div className="overview-value">
                    {formatValue(profile.probability, "N/A")}%
                  </div>
                </div>
                <div className="overview-card">
                  <div className="overview-label">Readiness</div>
                  <div className="overview-value">
                    {formatValue(profile.readiness_score, "N/A")}
                  </div>
                </div>
                <div className="overview-card">
                  <div className="overview-label">Student ID</div>
                  <div className="overview-value">
                    {formatValue(profile.student_id)}
                  </div>
                </div>
              </div>
              <div className="mini-grid" style={{ marginTop: 18 }}>
                {Object.entries(profile.profile || {}).map(([key, value]) => (
                  <div className="mini" key={key}>
                    <div className="mini-label">{key.replace(/_/g, " ")}</div>
                    <div className="mini-value">{formatValue(value)}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const Downloads = () => {
          const adminStudentId =
            selectedStudentId || students[0]?.student_id || "";
          return (
            <div className="downloads-grid">
              <section className="section-card">
                <div className="section-title">
                  <h2>Download section</h2>
                  <span>CSV exports</span>
                </div>
                <div className="download-actions">
                  {isAdmin ? (
                    <button
                      className="primary"
                      type="button"
                      onClick={() =>
                        downloadCsv(
                          "/api/download/overall.csv",
                          "overall_statistics.csv",
                        )
                      }
                      disabled={busyDownload === "overall_statistics.csv"}
                    >
                      {busyDownload === "overall_statistics.csv"
                        ? "Downloading..."
                        : "Overall statistics CSV"}
                    </button>
                  ) : null}
                  <button
                    className="flat-button"
                    type="button"
                    onClick={() =>
                      downloadCsv(
                        `/api/download/student.csv${isAdmin && adminStudentId ? `?student_id=${adminStudentId}` : ""}`,
                        `student_${adminStudentId || user.student_id}.csv`,
                      )
                    }
                    disabled={!isAdmin && !user}
                  >
                    {isStudent ? "My profile CSV" : "Student CSV"}
                  </button>
                  {isAdmin ? (
                    <>
                      <button
                        className="flat-button"
                        type="button"
                        onClick={() =>
                          downloadCsv(
                            "/api/download/dataset.csv",
                            "placement_dataset.csv",
                          )
                        }
                        disabled={busyDownload === "placement_dataset.csv"}
                      >
                        Raw dataset CSV
                      </button>
                      <button
                        className="flat-button"
                        type="button"
                        onClick={() =>
                          downloadCsv(
                            "/api/download/predictions.csv",
                            "dataset_predictions.csv",
                          )
                        }
                        disabled={busyDownload === "dataset_predictions.csv"}
                      >
                        Predictions CSV
                      </button>
                    </>
                  ) : null}
                </div>
                {isAdmin ? (
                  <div className="download-selector">
                    <label className="auth-field">
                      Student to export
                      <select
                        value={adminStudentId}
                        onChange={(event) =>
                          setSelectedStudentId(Number(event.target.value))
                        }
                      >
                        {students.map((student) => (
                          <option
                            key={student.student_id}
                            value={student.student_id}
                          >
                            {student.display_name || student.username} (ID{" "}
                            {student.student_id})
                          </option>
                        ))}
                      </select>
                    </label>
                  </div>
                ) : (
                  <div className="section-empty" style={{ marginTop: 14 }}>
                    Students can export only their own profile CSV.
                  </div>
                )}
              </section>

              <section className="section-card">
                <div className="section-title">
                  <h2>Export summary</h2>
                  <span>{roleLabel}</span>
                </div>
                <div className="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Item</th>
                        <th>Access</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>Overall statistics CSV</td>
                        <td>{isAdmin ? "Allowed" : "Admin only"}</td>
                      </tr>
                      <tr>
                        <td>Per-student CSV</td>
                        <td>{user ? "Allowed" : "Login required"}</td>
                      </tr>
                      <tr>
                        <td>Raw dataset CSV</td>
                        <td>{isAdmin ? "Allowed" : "Admin only"}</td>
                      </tr>
                      <tr>
                        <td>Predictions CSV</td>
                        <td>{isAdmin ? "Allowed" : "Admin only"}</td>
                      </tr>
                    </tbody>

        const navHeader = (

                    {item.label}

                <small>{user.display_name || user.username}</small>
                <small>{user.username}</small>

              ) : null}

              {page === "dashboard" ? <Dashboard /> : null}
              {page === "analytics" && isAdmin ? <Analytics /> : null}
              {page === "students" && isAdmin ? <Students /> : null}
              {page === "profile" ? <Profile /> : null}
              {page === "downloads" ? <Downloads /> : null}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
