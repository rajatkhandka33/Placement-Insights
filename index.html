<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Placement and Insights</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: rgba(255, 255, 255, 0.78);
        --text: #1f2328;
        --muted: #667085;
        --accent: #0f766e;
        --accent-soft: rgba(15, 118, 110, 0.12);
        --accent-2: #ca8a04;
        --border: rgba(31, 35, 40, 0.1);
        --shadow: 0 22px 60px rgba(21, 29, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Grande", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(15, 118, 110, 0.15),
            transparent 30%
          ),
          radial-gradient(
            circle at top right,
            rgba(202, 138, 4, 0.18),
            transparent 28%
          ),
          linear-gradient(135deg, #f7f2e8 0%, #f0e7d7 55%, #f7f4ef 100%);
        min-height: 100vh;
      }

      a {
        color: inherit;
      }

      .wrap {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        border-radius: 24px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.35fr 0.95fr;
        gap: 18px;
        align-items: stretch;
        margin-bottom: 18px;
      }

      .hero-main {
        padding: 30px;
        position: relative;
        overflow: hidden;
      }

      .hero-main::after {
        content: "";
        position: absolute;
        inset: auto -60px -60px auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(15, 118, 110, 0.24),
          transparent 68%
        );
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.3rem, 4vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .hero-copy {
        max-width: 68ch;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .hero-actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .hero-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border-radius: 14px;
        padding: 13px 18px;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .hero-link:hover {
        transform: translateY(-1px);
      }

      .primary-link {
        background: linear-gradient(135deg, var(--accent), #115e59);
        color: white;
        box-shadow: 0 16px 32px rgba(15, 118, 110, 0.22);
      }

      .ghost-link {
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .hero-side {
        padding: 24px;
        display: grid;
        gap: 14px;
        align-content: start;
      }

      .side-note {
        color: var(--muted);
        line-height: 1.6;
      }

      .workflow {
        display: grid;
        gap: 12px;
      }

      .workflow-step {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
      }

      .workflow-step strong {
        display: block;
        margin-bottom: 5px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .stat {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        min-height: 100px;
      }

      .stat .label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .stat .value {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .section {
        padding: 24px;
        margin-top: 18px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.03em;
      }

      .section-title span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .cards-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .info-card {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid var(--border);
      }

      .info-card h3 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .info-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: #125e5b;
        border: 1px solid rgba(15, 118, 110, 0.12);
        font-size: 13px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.02fr 0.98fr;
        gap: 18px;
        align-items: start;
        margin-top: 18px;
      }

      .card {
        padding: 24px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 0.95rem;
        color: #2f3640;
      }

      input {
        width: 100%;
        border: 1px solid rgba(31, 35, 40, 0.12);
        background: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        outline: none;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        transform: translateY(-1px);
      }

      .actions {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #115e59);
        color: white;
        box-shadow: 0 16px 32px rgba(15, 118, 110, 0.22);
      }

      .secondary {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .result-box {
        margin-top: 18px;
        border-radius: 20px;
        padding: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
      }

      .result-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .placed {
        background: rgba(15, 118, 110, 0.12);
        color: var(--accent);
      }

      .not-placed {
        background: rgba(202, 138, 4, 0.14);
        color: #92400e;
      }

      .mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .mini {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--border);
      }

      .mini .mini-label {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .mini .mini-value {
        font-size: 1.25rem;
        font-weight: 800;
      }

      .bars {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .bar-row {
        display: grid;
        gap: 6px;
      }

      .bar-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.92rem;
        color: #374151;
      }

      .bar-track {
        height: 12px;
        border-radius: 999px;
        background: rgba(31, 35, 40, 0.08);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #36b6a8);
      }

      .muted {
        color: var(--muted);
      }

      .list-block {
        margin: 12px 0 0;
        padding-left: 18px;
        color: #374151;
        line-height: 1.6;
      }

      .footer {
        margin-top: 18px;
        padding: 22px 24px;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        flex-wrap: wrap;
        align-items: center;
      }

      .footer small {
        color: var(--muted);
      }

      @media (max-width: 1080px) {
        .hero,
        .layout,
        .cards-3 {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .wrap {
          width: min(100% - 20px, 1240px);
        }

        .hero-main,
        .hero-side,
        .card,
        .section,
        .footer {
          padding: 18px;
        }

        .stat-grid,
        .form-grid,
        .mini-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      function App() {
        const [siteData, setSiteData] = useState(null);
        const [error, setError] = useState("");
        const [form, setForm] = useState({
          CGPA: 7.5,
          Internships: 1,
          Projects: 2,
          Certifications: 1,
          Communication_Skills: 72,
          Aptitude_Score: 75,
          Backlogs: 0,
        });
        const [result, setResult] = useState(null);
        const [predicting, setPredicting] = useState(false);

        useEffect(() => {
          fetch("/api/site-data")
            .then((response) => {
              if (!response.ok) {
                throw new Error("Unable to load site data");
              }
              return response.json();
            })
            .then(setSiteData)
            .catch((err) => setError(err.message));
        }, []);

        const summary = siteData?.insights?.summary ?? {};
        const project = siteData?.project ?? {};
        const model = siteData?.model ?? {};

        const heroStats = useMemo(
          () => [
            {
              label: "Total students",
              value: summary.total_students?.toLocaleString?.() ?? "...",
            },
            {
              label: "Placement rate",
              value:
                summary.placement_rate != null
                  ? `${summary.placement_rate}%`
                  : "...",
            },
            { label: "Average CGPA", value: summary.avg_cgpa ?? "..." },
            { label: "Average aptitude", value: summary.avg_aptitude ?? "..." },
          ],
          [summary],
        );

        const setField = (field, value) => {
          setForm((current) => ({ ...current, [field]: value }));
        };

        const resetForm = () => {
          setForm({
            CGPA: 7.5,
            Internships: 1,
            Projects: 2,
            Certifications: 1,
            Communication_Skills: 72,
            Aptitude_Score: 75,
            Backlogs: 0,
          });
          setResult(null);
        };

        const renderBars = (
          items,
          valueKey = "placement_rate",
          suffix = "%",
        ) => {
          if (!items?.length) {
            return (
              <div className="muted">
                Not enough grouped data for this chart.
              </div>
            );
          }

          const max = Math.max(
            ...items.map((item) => Math.abs(item[valueKey] ?? item.delta ?? 0)),
            1,
          );

          return items.map((item) => {
            const rawValue = item[valueKey] ?? item.delta ?? 0;
            const width = Math.max(8, (Math.abs(rawValue) / max) * 100);
            const labelValue =
              item.placement_rate !== undefined
                ? `${item.placement_rate}%`
                : `${item.delta >= 0 ? "+" : ""}${item.delta}`;

            return (
              <div className="bar-row" key={item.label}>
                <div className="bar-head">
                  <strong>{item.label}</strong>
                  <span>
                    {labelValue} {suffix}
                  </span>
                </div>
                <div className="bar-track">
                  <div
                    className="bar-fill"
                    style={{ width: `${width}%` }}
                  ></div>
                </div>
              </div>
            );
          });
        };

        const renderResult = () => {
          if (!result) {
            return (
              <div className="muted">
                Run a prediction to see placement outcome, readiness score, and
                recommendations.
              </div>
            );
          }

          const placed = result.result === "Placed";
          const probability =
            result.probability === null ? "N/A" : `${result.probability}%`;

          return (
            <>
              <div
                className={`result-pill ${placed ? "placed" : "not-placed"}`}
              >
                {result.result}
              </div>
              <div className="mini-grid">
                <div className="mini">
                  <div className="mini-label">Probability</div>
                  <div className="mini-value">{probability}</div>
                </div>
                <div className="mini">
                  <div className="mini-label">Readiness score</div>
                  <div className="mini-value">{result.readiness_score}/100</div>
                </div>
              </div>
              <div style={{ marginTop: 14, fontWeight: 700 }}>
                Suggested roles
              </div>
              <ul className="list-block">
                {result.recommendation.map((item) => (
                  <li key={item}>{item}</li>
                ))}
              </ul>
              <div style={{ marginTop: 14, fontWeight: 700 }}>Next steps</div>
              <ul className="list-block">
                {result.next_steps.map((item) => (
                  <li key={item}>{item}</li>
                ))}
              </ul>
            </>
          );
        };

        const predict = async (event) => {
          event.preventDefault();
          setPredicting(true);
          setResult(null);

          try {
            const response = await fetch("/api/predict", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(form),
            });

            if (!response.ok) {
              const payload = await response.json().catch(() => ({}));
              throw new Error(payload.detail || "Prediction failed");
            }

            setResult(await response.json());
          } catch (err) {
            setResult({
              result: "Not Placed",
              probability: null,
              readiness_score: 0,
              recommendation: [err.message],
              next_steps: [
                "Check the backend API",
                "Reload the page",
                "Confirm the model file exists",
              ],
            });
          } finally {
            setPredicting(false);
          }
        };

        const projectChips = [
          ...(project.tech_stack?.frontend ?? []).map((item) => ({
            group: "frontend",
            value: item,
          })),
          ...(project.tech_stack?.backend ?? []).map((item) => ({
            group: "backend",
            value: item,
          })),
          ...(project.tech_stack?.ml ?? []).map((item) => ({
            group: "ml",
            value: item,
          })),
          ...(project.tech_stack?.data ?? []).map((item) => ({
            group: "data",
            value: item,
          })),
        ];

        return (
          <main className="wrap">
            <section className="hero">
              <div className="panel hero-main">
                <div className="eyebrow">Smart Placement and Insights</div>
                <h1>
                  Placement intelligence built from the research paper, poster,
                  and dataset.
                </h1>
                <p className="hero-copy">
                  This React website combines a trained AI/ML model with
                  dataset-level analysis to predict placement outcomes, explain
                  the strongest drivers, and turn the project into a complete
                  interactive presentation.
                </p>
                <div className="hero-actions">
                  <a className="hero-link primary-link" href="#predictor">
                    Try the predictor
                  </a>
                  <a className="hero-link ghost-link" href="#insights">
                    View insights
                  </a>
                </div>
                <div className="stat-grid">
                  {heroStats.map((item) => (
                    <div className="stat" key={item.label}>
                      <div className="label">{item.label}</div>
                      <div className="value">{item.value}</div>
                    </div>
                  ))}
                </div>
              </div>

              <aside className="panel hero-side">
                <div className="section-title">
                  <h2>Project focus</h2>
                </div>
                <div className="side-note">
                  {project.summary || "Loading project summary..."}
                </div>
                <div className="workflow">
                  {(project.features || []).map((feature, index) => (
                    <div className="workflow-step" key={feature}>
                      <strong>
                        {index + 1}. {feature}
                      </strong>
                      <span className="muted">{feature}</span>
                    </div>
                  ))}
                </div>
                <div className="mini-grid">
                  <div className="mini">
                    <div className="mini-label">Model</div>
                    <div className="mini-value">
                      {model.algorithm || "Loading..."}
                    </div>
                  </div>
                  <div className="mini">
                    <div className="mini-label">Input features</div>
                    <div className="mini-value">7</div>
                  </div>
                  <div className="mini">
                    <div className="mini-label">Data rows</div>
                    <div className="mini-value">
                      {summary.total_students
                        ? summary.total_students.toLocaleString()
                        : "..."}
                    </div>
                  </div>
                  <div className="mini">
                    <div className="mini-label">Stack</div>
                    <div className="mini-value">FastAPI + React</div>
                  </div>
                </div>
              </aside>
            </section>

            <section className="panel section" id="overview">
              <div className="section-title">
                <h2>Research blueprint</h2>
                <span>Aligned with the paper and poster</span>
              </div>
              <div className="cards-3">
                {(project.objectives || []).map((objective, index) => (
                  <div className="info-card" key={objective}>
                    <h3>Objective {index + 1}</h3>
                    <p>{objective}</p>
                  </div>
                ))}
              </div>
              <div className="chip-row">
                {projectChips.map((chip) => (
                  <span className="chip" key={`${chip.group}-${chip.value}`}>
                    {chip.group}: {chip.value}
                  </span>
                ))}
              </div>
            </section>

            <section className="layout" id="predictor">
              <div className="panel card">
                <div className="section-title">
                  <h2>Placement predictor</h2>
                  <span>Same core features used by the trained model</span>
                </div>
                <form onSubmit={predict}>
                  <div className="form-grid">
                    {[
                      ["CGPA", 10],
                      ["Internships", 1],
                      ["Projects", 1],
                      ["Certifications", 1],
                      ["Communication_Skills", 0.1],
                      ["Aptitude_Score", 0.1],
                      ["Backlogs", 1],
                    ].map(([field, step]) => (
                      <label key={field}>
                        {field.replace(/_/g, " ")}
                        <input
                          type="number"
                          step={step}
                          min={0}
                          max={field === "CGPA" ? 10 : 100}
                          value={form[field]}
                          onChange={(event) =>
                            setField(field, Number(event.target.value))
                          }
                        />
                      </label>
                    ))}
                  </div>

                  <div className="actions">
                    <button
                      className="primary"
                      type="submit"
                      disabled={predicting}
                    >
                      {predicting ? "Predicting..." : "Predict Placement"}
                    </button>
                    <button
                      className="secondary"
                      type="button"
                      onClick={resetForm}
                    >
                      Reset
                    </button>
                  </div>
                </form>

                <div className="result-box">{renderResult()}</div>

                <div className="section-title" style={{ marginTop: 20 }}>
                  <h2>How the website uses AI/ML</h2>
                </div>
                <div className="workflow-step">
                  <strong>Model prediction</strong>
                  The backend feeds the seven core placement features into the
                  saved model and returns a placement outcome, confidence, and
                  readiness score.
                </div>
                <div className="workflow-step" style={{ marginTop: 12 }}>
                  <strong>Actionable guidance</strong>
                  The response includes role suggestions and next steps so the
                  result is useful beyond a single yes/no prediction.
                </div>
              </div>

              <div className="panel card" id="insights">
                <div className="section-title">
                  <h2>Dataset and model insights</h2>
                  <span>What the report and poster emphasize</span>
                </div>
                <div className="bars">
                  {renderBars(
                    siteData?.insights?.top_branches,
                    "placement_rate",
                    "%",
                  )}
                </div>
                <div className="bars">
                  {renderBars(
                    siteData?.insights?.college_tiers,
                    "placement_rate",
                    "%",
                  )}
                </div>
                <div className="bars">
                  {renderBars(siteData?.insights?.key_drivers, "delta", "gap")}
                </div>
                <div className="bars">
                  {renderBars(
                    model.top_importances?.map((item) => ({
                      label: item.label,
                      delta: item.score,
                    })),
                    "placement_rate",
                    "importance",
                  )}
                </div>
              </div>
            </section>

            <section className="panel section">
              <div className="section-title">
                <h2>Project modules</h2>
                <span>Complete flow from data to deployment</span>
              </div>
              <div className="cards-3">
                <div className="info-card">
                  <h3>Data ingestion</h3>
                  <p>
                    Reads the bundled placement dataset and computes placement
                    rate, feature gaps, and group-level trends.
                  </p>
                </div>
                <div className="info-card">
                  <h3>ML inference</h3>
                  <p>
                    Loads the saved model from disk through joblib and predicts
                    placement from the core student profile features.
                  </p>
                </div>
                <div className="info-card">
                  <h3>Web presentation</h3>
                  <p>
                    Uses React in the browser and FastAPI on the server so the
                    project behaves like a full website.
                  </p>
                </div>
              </div>
            </section>

            <section className="panel footer">
              <div>
                <strong>Smart Placement and Insights</strong>

                <small>
                  Built as a FastAPI + React AI/ML website for the placement

                </small>

        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
